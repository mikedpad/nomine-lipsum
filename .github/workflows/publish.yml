name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      # No token needed: npm authenticates via OIDC using the trusted publisher
      # configured for this package on npmjs.com. Provenance is generated
      # automatically. prepublishOnly re-runs the full lint/format/test gate.
      - name: Publish
        run: npm publish
